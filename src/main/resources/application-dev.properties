# application-dev.properties (Development environment)
## Database configuration
#spring.datasource.url=jdbc:h2:mem:devdb
#spring.datasource.driverClassName=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#spring.h2.console.enabled=true
#
## JPA/Hibernate settings
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=true

# Stock API configuration (replace with your actual API details)
stock.api.base-url=https://api.example.com/stock/v1
stock.api.key=${STOCK_API_KEY:your-default-api-key}

# Cache configuration (TTL in milliseconds, default 5 minutes)
stock.cache.ttl=300000

# Logging
logging.level.com.stockapi=INFO
logging.level.org.springframework.web.reactive.function.client.ExchangeFilterFunction=DEBUG

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
