# application-prod.properties (Production environment)
# Database configuration
spring.datasource.url=jdbc:mysql://prod-db-server:3306/proddb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Stock API configuration (replace with your actual API details)
stock.api.base-url=https://api.example.com/stock/v1
stock.api.key=${STOCK_API_KEY:your-default-api-key}

# Cache configuration (TTL in milliseconds, default 5 minutes)
stock.cache.ttl=300000

# Production-specific settings
server.tomcat.max-threads=200
spring.datasource.hikari.maximum-pool-size=20