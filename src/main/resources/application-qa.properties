# application-qa.properties (QA environment)
# Database configuration
spring.datasource.url=jdbc:mysql://qa-db-server:3306/qadb
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=qa_user
spring.datasource.password=qa_password

# JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Stock API configuration (replace with your actual API details)
stock.api.base-url=https://api.example.com/stock/v1
stock.api.key=${STOCK_API_KEY:your-default-api-key}

# Cache configuration (TTL in milliseconds, default 5 minutes)
stock.cache.ttl=300000
